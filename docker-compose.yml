services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stock-profit-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: stock-profit-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend